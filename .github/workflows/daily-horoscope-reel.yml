name: Post Daily Horoscope Reel

on:
  schedule:
    # 9:55 AM Asia/Kolkata = 04:25 UTC (India does not observe DST)
    - cron: "25 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-render-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: remotion_reel/package.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Install Remotion dependencies
        working-directory: remotion_reel
        run: npm install

      - name: Generate, render, post, and clean up
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          META_GRAPH_API_VERSION: ${{ secrets.META_GRAPH_API_VERSION }}
        run: |
          python viral_horoscope_pipeline.py --generate --render --post --cleanup
