name: Post Daily Horoscope Reel

on:
  schedule:
    # 3 times daily: 12:00 AM, 8:00 AM, 4:00 PM UTC
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:
    inputs:
      style:
        description: "Reel style to generate"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - random_daily
          - random_viral
          - all_signs
          - daily_transit
          - love_attachment
          - shadow_callout
          - compatibility_drama
          - money_power
          - weekend_tension
          - moon_sign_mood
          - placement_based
          - fixed_self_respect
          - fire_do_not_chase
          - moved_on_but_didnt
          - moon_scorpio_exposure
          - generator
      gen_format:
        description: "Generator format (if style=generator)"
        required: false
        default: "4-sign"
        type: choice
        options:
          - 4-sign
          - all12
          - 3sign-rival
          - 1sign
      gen_theme:
        description: "Generator theme (if style=generator)"
        required: false
        default: "attachment"
        type: choice
        options:
          - attachment
          - ego
          - boundaries
          - romance
          - career
          - shadow
      gen_tone:
        description: "Generator tone (if style=generator)"
        required: false
        default: "perceptive-friend"
        type: choice
        options:
          - perceptive-friend
          - dry-wit
          - blunt
          - warm
      gen_transit:
        description: "Generator transit (if style=generator)"
        required: false
        default: "mercury-rx"
        type: choice
        options:
          - mercury-rx
          - venus-pisces
          - mars-gemini
          - saturn-sq
          - full-moon
          - north-node
      theme:
        description: "Optional theme override"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-horoscope-reel
  cancel-in-progress: false

jobs:
  generate-render-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REEL_STYLE: ${{ inputs.style || 'daily' }}
      REEL_THEME: ${{ inputs.theme || '' }}
      GEN_FORMAT: ${{ inputs.gen_format || '4-sign' }}
      GEN_THEME: ${{ inputs.gen_theme || 'attachment' }}
      GEN_TONE: ${{ inputs.gen_tone || 'perceptive-friend' }}
      GEN_TRANSIT: ${{ inputs.gen_transit || 'mercury-rx' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: remotion_reel/package.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Install Remotion dependencies
        working-directory: remotion_reel
        run: npm install

      - name: Run Scheduled Post Manager
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          META_GRAPH_API_VERSION: ${{ secrets.META_GRAPH_API_VERSION }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          python scheduled_post_manager.py

      - name: Persist pipeline state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f pipeline_state.json ]; then
            git add pipeline_state.json
            git commit -m "chore: update pipeline state [skip ci]" || echo "No changes to commit"
            git push
          fi

      - name: Clean up local outputs
        if: always()
        run: rm -rf generated_reels/
