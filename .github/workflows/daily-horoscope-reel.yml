name: Post Daily Horoscope Reel

on:
  schedule:
    # 9:55 AM Asia/Kolkata = 04:25 UTC (India does not observe DST)
    - cron: "25 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-render-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: remotion_reel/package.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Install Remotion dependencies
        working-directory: remotion_reel
        run: npm install

      - name: Generate content bundle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python viral_horoscope_pipeline.py --generate
          # Save the bundle path for later steps
          BUNDLE=$(ls -td generated_reels/*/ | head -1)
          echo "BUNDLE_DIR=${BUNDLE}" >> $GITHUB_ENV
          echo "BUNDLE_PATH=${BUNDLE}horoscope_bundle.json" >> $GITHUB_ENV

      - name: Render reel with Remotion
        run: |
          python viral_horoscope_pipeline.py --render \
            --input "${{ env.BUNDLE_PATH }}"
          echo "REEL_PATH=${{ env.BUNDLE_DIR }}horoscope_reel.mp4" >> $GITHUB_ENV

      - name: Upload reel to Cloudinary (get public URL)
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          VIDEO_URL=$(python upload_to_cloudinary.py "${{ env.REEL_PATH }}")
          echo "VIDEO_URL=${VIDEO_URL}" >> $GITHUB_ENV
          echo "Uploaded to: ${VIDEO_URL}"

      - name: Post reel to Instagram
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          META_GRAPH_API_VERSION: ${{ secrets.META_GRAPH_API_VERSION }}
        run: |
          python viral_horoscope_pipeline.py --post \
            --input "${{ env.BUNDLE_PATH }}" \
            --video-url "${{ env.VIDEO_URL }}"

      - name: Clean up local outputs
        if: always()
        run: rm -rf generated_reels/